services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: work_log
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npx prisma migrate deploy && npm run start:dev"
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/work_log
      PORT: 8000
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - '8000:8000'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '5175:5175'
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
